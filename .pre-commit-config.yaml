# Local pre-commit hooks (bd dno) — the FAST static gates run before every commit, so a violation is caught
# locally instead of in CI. Same pinned tools + scopes as .github/workflows/ci.yml (one source of truth for
# the commands; the pin is the uvx tool version). Enable with `pre-commit install` (note: this repo also ships
# .beads/hooks/pre-commit for the issue tracker — if you install this, chain or keep the beads hook separately).
# Run without installing: `uvx pre-commit run --all-files`.
#
# These gates scan FIXED scopes (core/neuroscan/baselines), not the staged file list, so pass_filenames=false
# + always_run=true. The slow test/coverage gate stays CI-only (too slow for every commit).
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff — enforced families
        entry: uvx ruff@0.15.13 check core neuroscan baselines --select W,F,I,B,T20,E7,PLR2004,PLC0415,FBT,C901,PLR0912,PLR0915,BLE001,S110,PLR0913,RUF100
        language: system
        pass_filenames: false
        always_run: true
      - id: ast-grep
        name: ast-grep — module shape (no top-level funcs / import-time side effects)
        entry: uvx --from ast-grep-cli ast-grep scan -c devtools/sgconfig.yml core neuroscan
        language: system
        pass_filenames: false
        always_run: true
      - id: arch-fitness
        name: architecture fitness — graph.py --assert
        entry: uv run --extra devtools python -m devtools.graph --assert
        language: system
        pass_filenames: false
        always_run: true
      - id: import-linter
        name: import layers — core < neuroscan < neuroviz
        entry: uvx --from import-linter lint-imports
        language: system
        pass_filenames: false
        always_run: true
      - id: vulture
        name: dead code — vulture conf>=80
        entry: uvx vulture@2.16 --min-confidence 80
        language: system
        pass_filenames: false
        always_run: true
