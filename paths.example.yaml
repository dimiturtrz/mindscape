# Template for paths.yaml (gitignored — your machine's absolute path).
#   cp paths.example.yaml paths.yaml   # then set the one path below
#
# ONE data root. Everything else is derived:
#   <data>/raw/        MOABB/MNE download cache (register-gated sets land here; never commit)
#   <data>/processed/  epoched preprocess cache — created automatically, never touch it
#
# Env MINDSCAPE_DATA overrides this file (handy for CI).
data: /path/to/neural-data
