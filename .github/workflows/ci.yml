name: tests

# Gate for the dev -> main flow: unit tests must pass on every PR (and on pushes to dev/main).
# Enforced as a required status check via branch protection on main.
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  tests:
    runs-on: ubuntu-latest
    # no dataset on the runner -> point config at an empty dir so the data-gated smoke tests skip cleanly
    # (adapters glob an absent raw/ dir -> no subjects -> pytest.skip) instead of erroring on a missing paths.yaml.
    env:
      MINDSCAPE_DATA: /tmp/mindscape-nodata
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies (locked, + dev extra for pytest + coverage)
        run: uv sync --frozen --extra dev
      # One instrumented run = the test gate AND the coverage data. Config (source/omit/exclude) lives in
      # [tool.coverage.*] — denominator is library LOGIC, not filesystem/mlflow/libs/downloads/GPU shells.
      - name: Unit tests + coverage (tests block)
        run: uv run pytest tests/unit --cov --cov-report=term-missing -q
      # Coverage is ADVISORY (bd mindscape-y63 coverage-ratchet): print the logic-% + missing lines, never
      # block, until the untested logic cores under tasks/ are extracted + tested and a floor is set.
      - name: Coverage — advisory (logic %, non-blocking)
        if: always()
        run: uv run coverage report || true
      # Enforced floor (bd mindscape-y63 coverage-ratchet): the logic cores under tasks/ are extracted +
      # tested, so the gate now BLOCKS below 80% (logic %). Raise the floor as coverage climbs.
      - name: Coverage floor — enforced (>=80, blocks)
        run: uv run coverage report --fail-under=80

  # Static-analysis ratchet (bd mindscape-y63): the two axes that don't need the test env — ruff (style/bugs)
  # + vulture (dead code). ENFORCED steps block on the graduated ruff families + vulture conf>=80; ADVISORY
  # steps surface the rest of the curated backlog, formatting, and conf>=60 dead-code warnings.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Ruff — enforced (graduated families block)
        run: uvx ruff@0.15.13 check core neuroscan baselines --select W,F,I,B,T20,E7,PLR2004,PLC0415,FBT,C901,PLR0912,PLR0915,BLE001,S110,PLR0913,RUF100
      - name: Ruff — advisory backlog (non-blocking)
        run: uvx ruff@0.15.13 check . --statistics || true
      - name: Ruff — format check (advisory)
        run: uvx ruff@0.15.13 format --check . || true
      # Dead code — the axis ruff can't see (paths/ignores in [tool.vulture]). BLOCKS at conf>=80
      # (near-certain: unreachable, unused locals — currently clean); WARNS at conf>=60 (dead funcs, eats
      # entry-point/no-fan-in FPs) as GitHub annotations, never blocks.
      - name: Dead code — enforced (vulture conf>=80)
        run: uvx vulture@2.16 --min-confidence 80
      - name: Dead code — advisory (vulture conf>=60, warns)
        if: always()
        run: |
          uvx vulture@2.16 --min-confidence 60 | sed -E 's#^([^:]+):([0-9]+): (.*)$#::warning file=\1,line=\2::\3#' || true
