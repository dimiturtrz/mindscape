<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>neuroviz — EEG + fNIRS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="head-text">
      <h1>neuroviz</h1>
      <p class="sub" id="sub"></p>
    </div>
    <div class="mapgroup head-modality">
      <span class="glabel">modality</span>
      <div class="seg seg-lg" id="modality"><!-- EEG / fNIRS buttons, built in JS --></div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="controls">
        <div class="mapgroup">
          <span class="glabel">subject</span>
          <select id="subject"></select>
        </div>
        <div class="mapgroup">
          <span class="glabel">view</span>
          <select id="view"></select>
        </div>
        <div class="mapgroup">
          <span class="glabel">method</span>
          <select id="method"></select>
        </div>
        <div class="mapsel" id="map"><!-- CSP filter sub-dropdown, built in JS --></div>
      </div>
      <div class="result" id="result"><!-- ground truth vs decoder prediction + score, built in JS --></div>

      <div class="topo-wrap">
        <div class="topo-box"><canvas id="topo" width="360" height="360"></canvas></div>
        <div class="classbar" id="classbar"></div>
        <div class="player" id="player">
          <button id="play">▶</button>
          <input id="scrub" type="range" min="0" max="49" value="25" step="1" />
          <span id="tlabel" class="tlabel">0.0 s</span>
        </div>
        <div class="speedbar" id="speedbar">
          <span class="glabel">speed</span>
          <!-- log scale: slider is log10(speed) in [-1,1] -> 0.1×…10×, centre (0) = 1× -->
          <input id="speed" type="range" min="-1" max="1" step="0.02" value="0" />
          <span id="speedlabel" class="tlabel">1.0×</span>
        </div>
        <div class="cbar"><span>−</span><div class="cgrad"></div><span>+</span></div>
      </div>
      <p class="hint" id="hint"></p>
    </section>

    <section class="panel waves">
      <h2 id="wavehead"></h2>
      <canvas id="waves" width="640" height="520"></canvas>
      <p class="hint" id="wavehint"></p>
    </section>
  </main>

  <footer>Commodity decoders, honest eval — the contribution is the measured cross-subject generalization,
    now shown per trial (truth vs prediction), not the pretty topomap.</footer>
  <script src="app.js"></script>
</body>
</html>
